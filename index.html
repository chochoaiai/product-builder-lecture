<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Insight | 최신 AI 뉴스 요약</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <header>
        <div class="header-content">
            <h1>AI News Insight</h1>
            <div class="theme-toggle">
                <button id="theme-btn">🌙 Dark Mode</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <!-- List View -->
        <section id="list-view">
            <div class="section-header">
                <h2>오늘의 핵심 AI 뉴스</h2>
                <p>글로벌 최신 뉴스를 5개만 엄선하여 전해드립니다.</p>
            </div>
            <div id="news-container" class="news-grid">
                <!-- News cards will be injected here -->
                <div class="loading">뉴스를 불러오는 중...</div>
            </div>
        </section>

        <!-- Detail View (Hidden by default) -->
        <section id="detail-view" style="display: none;">
            <button id="back-btn" class="back-button">← 목록으로 돌아가기</button>
            <article id="article-detail">
                <!-- Detail content will be injected here -->
            </article>
        </section>

        <div class="divider"></div>
        
        <div id="comments-section">
            <h3>커뮤니티 소통</h3>
            <div id="disqus_thread"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="divider"></div>
        <div class="footer-content">
            <p>&copy; 2026 AI News Insight. All rights reserved.</p>
            <div class="partnership-link">
                <a href="#contact-form-anchor" id="show-contact">제휴 문의</a>
            </div>
        </div>
    </footer>

    <!-- Contact Modal (Optional, for partnership) -->
    <div id="contact-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="contact-section">
                <h2>제휴 문의</h2>
                <form action="https://formspree.io/f/mvzlkbvd" method="POST" id="contact-form">
                    <div class="form-group">
                        <input type="email" name="email" placeholder="이메일 주소" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의 보내기</button>
                </form>
            </div>
        </div>
    </div>

    <script src="main.js" type="module"></script>
    <script>
        // Disqus Load Script
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder3.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
